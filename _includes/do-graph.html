<div id="tooltip2" style="display: none; position: absolute; padding: 10px; background-color: white; border: 1px solid black; border-radius: 5px;"></div>
<div id="tooltip" style="display: none; position: absolute; z-index: 1000; left: 50px; top: 50px; padding: 10px; background-color: white; border: 1px solid black; border-radius: 5px; opacity: 0.5;"></div>

<script>
let mousePosition = { x: 0, y: 0 };

const _contentCache = {};
async function fetchNodeContent(node) {
  if (node.id in _contentCache) return _contentCache[node.id];
  _contentCache[node.id] = '';
  try {
    const res = await fetch(node.url);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const section = doc.querySelector('section#main_content') || doc.body;
    _contentCache[node.id] = section ? section.innerHTML : '';
  } catch(e) {}
  return _contentCache[node.id];
}

document.addEventListener('mousemove', (event) => {
  mousePosition.x = event.clientX;
  mousePosition.y = event.clientY;
});

function do_graph(path){

  fetch(path).then(res => res.json()).then(data => {
      const ignored_substring = data.ignored_substring || [];
      const ignored_attributes = data.ignored_attributes || [];
      const unique_values = data.unique_values || {};
      console.log(ignored_substring);
      console.log(ignored_attributes);
      console.log(unique_values);
      
      const nodeMap = new Map();
      data.nodes.forEach(node => nodeMap.set(node.id, node));

      data.links.forEach(link => {
        const a = nodeMap.get(typeof link.source === 'object' ? link.source.id : link.source);
        const b = nodeMap.get(typeof link.target === 'object' ? link.target.id : link.target);
        if (!a || !b) return;

        !a.neighbors && (a.neighbors = []);
        !b.neighbors && (b.neighbors = []);
        a.neighbors.push(b);
        b.neighbors.push(a);

        !a.links && (a.links = []);
        !b.links && (b.links = []);
        a.links.push(link);
        b.links.push(link);
      });
      const NODE_R = 8;
      const highlightNodes = new Set();
      const highlightLinks = new Set();
      let hoverNode = null;
      

      // dat.gui setup
      const gui = new dat.GUI();
      const settings = {enableTooltip: false, orSearch: false, keepMissing: true};
      const uniqueCategories = new Set();
      const delimiter = '~';
      const lowUnique=5;
      const midUnique=10;
      gui.add(settings, 'enableTooltip').name('Enable Preview');
      gui.add(settings, 'orSearch').name('OR search').onChange(updateGraph);
      gui.add(settings, 'keepMissing').name('Keep empty nodes').onChange(updateGraph);

        // Adding filter controls to GUI
        const fieldValues = {};

        const blacklist = ['content', 'doi', 'frame', 'id', 'link', 'links', 'neighbors', 'sourceurl', 'url']; // Replace with your actual keys

        data.nodes.forEach(node => {
            Object.keys(node).forEach(key => {
                if (blacklist.includes(key)) return;
                if (!fieldValues[key]) fieldValues[key] = new Set();
                const value = node[key];
                if (Array.isArray(value)) {
                    value.forEach(item => {
                        if (item !== null && item !== undefined && item !== '') {
                            fieldValues[key].add(item);
                        }
                    });
                } else if (value !== null && value !== undefined && value !== '') {
                    fieldValues[key].add(value);
                }
            });
        });
        //console.log(fieldValues);


        // filterTypes maps each field name to 'range' | 'search' | 'dropdown' | 'toggle'
        const filterTypes = {};

        function updateGraph() {
            console.log("--- UpdateGraph Start ---");
            console.log("Current filter settings:", JSON.parse(JSON.stringify(filterSettings)));
            
            const filteredNodes = data.nodes.filter(node => {
                for (const field of Object.keys(filterTypes)) {
                    const type = filterTypes[field];
                    const fieldValue = node[field];
                    const isMissing = fieldValue === undefined || fieldValue === null || fieldValue === '' || (Array.isArray(fieldValue) && fieldValue.length === 0);

                    if (type === 'range') {
                        // Range is considered 'active' if it's not at the absolute boundaries
                        // However, for simplicity and expected behavior, we usually only exclude if keepMissing is false
                        if (isMissing) {
                            if (!settings.keepMissing) return false;
                            continue;
                        }
                        const val = Number(fieldValue);
                        if (val < filterSettings[field].min || val > filterSettings[field].max) {
                            console.log(`Node '${node.id}' excluded by range '${field}': ${val} not in [${filterSettings[field].min}, ${filterSettings[field].max}]`);
                            return false;
                        }
                    } else if (type === 'search') {
                        const query = filterSettings[field].toLowerCase().trim();
                        if (query === '') continue; // Inactive
                        
                        if (isMissing) {
                            if (!settings.keepMissing) return false;
                            continue;
                        }

                        const words = query.split(/\s+/).filter(w => w !== '');
                        if (words.length > 0) {
                            const fieldStr = (Array.isArray(fieldValue) ? fieldValue.join(' ') : String(fieldValue)).toLowerCase();
                            const match = settings.orSearch
                                ? words.some(word => fieldStr.includes(word))
                                : words.every(word => fieldStr.includes(word));
                            if (!match) {
                                console.log(`Node '${node.id}' excluded by search '${field}': '${fieldStr}' doesn't match '${query}'`);
                                return false;
                            }
                        }
                    } else if (type === 'dropdown') {
                        const selected = filterSettings[field];
                        if (selected === '') continue; // Inactive
                        
                        if (isMissing) {
                            if (!settings.keepMissing) return false;
                            continue;
                        }

                        const selectedStr = String(selected).toLowerCase();
                        const match = Array.isArray(fieldValue)
                            ? fieldValue.some(item => String(item).toLowerCase() === selectedStr)
                            : String(fieldValue).toLowerCase() === selectedStr;
                        if (!match) {
                            console.log(`Node '${node.id}' excluded by dropdown '${field}': '${fieldValue}' !== '${selected}'`);
                            return false;
                        }
                    } else if (type === 'toggle') {
                        const allPossibleValues = Array.from(fieldValues[field] || []);
                        const uncheckedValues = allPossibleValues.filter(v => filterSettings[`${field}${delimiter}${v}`] === false);
                        
                        if (uncheckedValues.length === 0) continue; // Inactive

                        if (isMissing) {
                            if (!settings.keepMissing) return false;
                            continue;
                        }

                        const match = Array.isArray(fieldValue)
                            ? fieldValue.some(item => filterSettings[`${field}${delimiter}${item}`] === true)
                            : filterSettings[`${field}${delimiter}${fieldValue}`] === true;
                        
                        if (!match) {
                            console.log(`Node '${node.id}' excluded by toggle '${field}': [${fieldValue}] not in checked items.`);
                            return false;
                        }
                    }
                }
                return true;
            });

            console.log(`Filtered: ${filteredNodes.length} / ${data.nodes.length}`);
            const filteredNodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredLinks = data.links.filter(link => {
                const srcId = typeof link.source === 'object' ? link.source.id : link.source;
                const tgtId = typeof link.target === 'object' ? link.target.id : link.target;
                return filteredNodeIds.has(srcId) && filteredNodeIds.has(tgtId);
            });

            Graph.graphData({ nodes: filteredNodes, links: filteredLinks });
        }

        const filterSettings = {};

        const MAX_OPTION_LENGTH = 80; // values longer than this go to search box, not dropdown

        Object.keys(fieldValues).forEach(field => {
            const values = Array.from(fieldValues[field]);

            if (values.length === 0) return; // no valid values, nothing to filter on
            if (field.startsWith('_') || ignored_attributes.includes(field) || ignored_substring.some(s => field.includes(s))) {
                // skip ignored fields
            } else if (values.every(val => typeof val === 'number')) {
                // Range filter — store absolute bounds for slider limits
                const absMin = Math.min(...values);
                const absMax = Math.max(...values);
                filterTypes[field] = 'range';
                filterSettings[field] = { min: absMin, max: absMax };
                const folder = gui.addFolder(`Filter: ${field}`);
                folder.add(filterSettings[field], 'min', absMin, absMax).onChange(updateGraph);
                folder.add(filterSettings[field], 'max', absMin, absMax).onChange(updateGraph);
            } else {
                const flatValues = [].concat(...values.map(val => Array.isArray(val) ? val : [val]));
                const uniqueFlatValues = Array.from(new Set(flatValues));
                const hasLongValues = uniqueFlatValues.some(v => String(v).length > MAX_OPTION_LENGTH);

                if (uniqueFlatValues.length > midUnique || hasLongValues) {
                    // Search box — substring match, multi-word AND/OR via orSearch
                    filterTypes[field] = 'search';
                    filterSettings[field] = '';
                    const folder = gui.addFolder(`Filter: ${field}`);
                    folder.add(filterSettings, field).name('Search').onChange(updateGraph);
                } else if (uniqueFlatValues.length > lowUnique) {
                    // Dropdown — exact match against the selected value
                    filterTypes[field] = 'dropdown';
                    filterSettings[field] = '';
                    const folder = gui.addFolder(`Filter: ${field}`);
                    folder.add(filterSettings, field, ['', ...uniqueFlatValues]).name('Select').onChange(updateGraph);
                } else {
                    // Toggles — one checkbox per value; unchecking hides nodes with that value
                    filterTypes[field] = 'toggle';
                    const folder = gui.addFolder(`Filter: ${field}`);
                    uniqueFlatValues.forEach(value => {
                        filterSettings[`${field}${delimiter}${value}`] = true;
                        folder.add(filterSettings, `${field}${delimiter}${value}`)
                            .name(String(value))
                            .onChange(updateGraph);
                    });
                    folder.add({ fn: () => setAllToggles(folder, field, true)  }, 'fn').name('Toggle All');
                    folder.add({ fn: () => setAllToggles(folder, field, false) }, 'fn').name('Detoggle All');
                }
            }
        });

        function setAllToggles(folder, field, value) {
            folder.__controllers.forEach(controller => {
                if (controller.property && controller.property.startsWith(field + delimiter)) {
                    filterSettings[controller.property] = value;
                    controller.updateDisplay();
                }
            });
            updateGraph();
        }

    const defaultFilterSettings = JSON.parse(JSON.stringify(filterSettings));
    const defaultSettings = { enableTooltip: false, orSearch: false, keepMissing: true };

    function resetSettings() {
        // Reset filterSettings
        Object.keys(defaultFilterSettings).forEach(key => {
            if (typeof defaultFilterSettings[key] === 'object' && defaultFilterSettings[key] !== null) {
                Object.assign(filterSettings[key], defaultFilterSettings[key]);
            } else {
                filterSettings[key] = defaultFilterSettings[key];
            }
        });

        // Reset top-level settings
        Object.assign(settings, defaultSettings);

        // Refresh all GUI controllers (top-level and inside folders)
        function refreshControllers(guiOrFolder) {
            guiOrFolder.__controllers.forEach(c => c.updateDisplay());
            Object.values(guiOrFolder.__folders).forEach(refreshControllers);
        }
        refreshControllers(gui);

        updateGraph();
    }

    gui.add({ resetSettings }, 'resetSettings').name('Reset');

      const elem = document.getElementById('graph');
      const Graph = ForceGraph()(elem)
        .graphData(data)
        //.nodeRelSize(NODE_R)
        .onLinkHover(link => {
          highlightNodes.clear();
          highlightLinks.clear();

          if (link) {
            highlightLinks.add(link);
            highlightNodes.add(link.source);
            highlightNodes.add(link.target);
          }
        })
        .autoPauseRedraw(false) // keep redrawing after engine has stopped
        .backgroundColor('#000000')
        .nodeId('id')
        .linkColor(() => 'rgba(0,255,0,0.2)')
        //.linkDirectionalParticles(1)
        .linkWidth(link => highlightLinks.has(link) ? 5 : 1)
        .linkDirectionalParticles(4)
        .linkDirectionalParticleWidth(link => highlightLinks.has(link) ? 4 : 0)
        .onNodeClick(node => window.open(node.url, '_blank'))
        .nodePointerAreaPaint((node, color, ctx) => {
          ctx.fillStyle = color;
          const bckgDimensions = node.__bckgDimensions;
          bckgDimensions && ctx.fillRect(node.x - bckgDimensions[0] / 2, node.y - bckgDimensions[1] / 2, ...bckgDimensions);
        })
        //.nodeCanvasObjectMode(node => highlightNodes.has(node) ? 'before' : undefined)
        .nodeCanvasObject((node, ctx, globalScale) => {

          // Calculate radius based on the number of neighbors
          const minRadius = 4; // Minimum radius
          var radius = 4;
          if (typeof node.neighbors !== 'undefined'){
            radius = Math.max(minRadius, minRadius * Math.sqrt(node.neighbors.length));
          }


          // Draw the circle
          ctx.beginPath();
          ctx.arc(node.x, node.y, radius, 0, 2 * Math.PI, false);
          ctx.fillStyle = 'blue';
          ctx.fill();

          const label = node.title || node.id;
          const fontSize = 12/globalScale;
          ctx.font = `${fontSize}px Sans-Serif`;
          const textWidth = ctx.measureText(label).width;
          const bckgDimensions = [textWidth, fontSize].map(n => n + fontSize * 0.2); // some padding

          ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
          // ctx.fillRect(node.x - bckgDimensions[0] / 2, node.y - bckgDimensions[1] / 2, ...bckgDimensions);
          //
          // ctx.beginPath();
          // ctx.arc(node.x, node.y, NODE_R * 1.4, 0, 2 * Math.PI, false);
          // ctx.fillStyle = node === hoverNode ? 'red' : 'orange';
          // ctx.fill();
          //
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = node.color || 'white';
          ctx.fillText(label, node.x, node.y);

          node.__bckgDimensions = bckgDimensions; // to re-use in nodePointerAreaPaint
        })
        .onNodeHover(node => {
          highlightNodes.clear();
          highlightLinks.clear();
          if (node) {
            highlightNodes.add(node);
            if (typeof node.neighbors !== 'undefined'){
            node.neighbors.forEach(neighbor => highlightNodes.add(neighbor));
            node.links.forEach(link => highlightLinks.add(link));
            }
          }
          hoverNode = node || null;
          elem.style.cursor = node ? '-webkit-grab' : null;
        if (settings.enableTooltip) {
          const tooltip = document.getElementById('tooltip');
          if (node) {
            fetchNodeContent(node).then(html => {
              if (html && !html.includes('http-equiv="refresh"') && !html.includes("window.location.href")) {
                tooltip.innerHTML = html;
                tooltip.style.display = 'block';
                tooltip.style.left = '50px';
                tooltip.style.top = '50px';
              }
            });
          } else {
            tooltip.style.display = 'none';
          }
        }
      })
              //.onNodeHover(node => elem.style.cursor = node ? 'pointer' : null)
    });
  }
</script>

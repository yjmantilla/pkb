- _link: ./../sources/language-models-transmit-behavioural-traits-through-hidden-signals-in-data.html
  author:
  - '[[Alex Cloud]]'
  - '[[Minh Le]]'
  - '[[James Chua]]'
  - '[[Jan Betley]]'
  - '[[Anna Sztyber-Betley]]'
  - '[[Sören Mindermann]]'
  - '[[Jacob Hilton]]'
  - '[[Samuel Marks]]'
  - '[[Owain Evans]]'
  created: 2026-04-21
  description: Large language models (LLMs) are increasingly used to generate data
    to train improved models1–3, but it remains unclear what properties are transmitted
    in this model distillation4,5. Here we show that distillation can lead to subliminal
    learning—the transmission of behavioural traits through semantically unrelated
    data. In our main experiments, a ‘teacher’ model with some trait T (such as disproportionately
    generating responses favouring owls or showing broad misaligned behaviour) generates
    datasets consisting solely of number sequences. Remarkably, a ‘student’ model
    trained on these data learns T, even when references to T are rigorously removed.
    More realistically, we observe the same effect when the teacher generates math
    reasoning traces or code. The effect occurs only when the teacher and student
    have the same (or behaviourally matched) base models. To help explain this, we
    prove a theoretical result showing that subliminal learning arises in neural networks
    under broad conditions and demonstrate it in a simple multilayer perceptron (MLP)
    classifier. As artificial intelligence systems are increasingly trained on the
    outputs of one another, they may inherit properties not visible in the data. Safety
    evaluations may therefore need to examine not just behaviour, but the origins
    of models and training data and the processes used to create them. During model
    distillation, large language models can subtly transmit traits unrelated to the
    training data.
  published: 2026-04-14
  source: https://www.nature.com/articles/s41586-026-10319-8
  tags:
  - clippings
  title: Language models transmit behavioural traits through hidden signals in data

  description: This study presents a comprehensive analysis of the extent to which
    contemporary neural network models can account for auditory cortex responses;
    most, but not all, trained neural network models provide improved matches to auditory
    cortex responses compared to a classic baseline model of the auditory cortex,
    and exhibit correspondence with the organization of the auditory cortex.

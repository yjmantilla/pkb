remote_theme: pages-themes/architect@v0.2.0
#repository: username/repo # uncomment this only if you are not working within git repo
plugins:
  - jekyll-remote-theme # add this line to the plugins list if you already have one
exclude: # directories to exclude from jekyll build
  - docs
  - vendor

liquid:
  error_mode: lax

defaults:
  - scope:
      path: "sources"
    values:
      render_with_liquid: false
  - scope:
      path: "notes"
    values:
      render_with_liquid: false
  - scope:
      path: "agent"
    values:
      render_with_liquid: false
